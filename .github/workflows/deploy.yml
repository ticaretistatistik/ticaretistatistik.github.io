name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Daily rebuild at 06:00 UTC (09:00 Europe/Istanbul). Picks up any new
  # events added to the public Google Calendar since the last build,
  # which scripts/fetch-events.mjs reads during `npm run prebuild`.
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger from the Actions tab — handy for pushing calendar
  # updates before the next scheduled run.
  workflow_dispatch:

# Only one deploy at a time. A cron run and a push landing together
# would otherwise race each other on the github-pages environment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
