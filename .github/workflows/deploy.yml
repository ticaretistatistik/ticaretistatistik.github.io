name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Rebuild every 6 hours (00:00, 06:00, 12:00, 18:00 UTC ≈ 03:00, 09:00,
  # 15:00, 21:00 Europe/Istanbul). Picks up new entries from the public
  # Google Calendar and the glossary Sheet since the last build.
  schedule:
    - cron: '0 */6 * * *'

  # Manual trigger from the Actions tab — handy for pushing calendar
  # updates before the next scheduled run.
  workflow_dispatch:

# Only one deploy at a time. A cron run and a push landing together
# would otherwise race each other on the github-pages environment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
        env:
          # Public CSV URL of the glossary Google Sheet. Set this as a repo
          # Variable (Settings > Secrets and variables > Actions > Variables)
          # named GLOSSARY_SHEET_CSV_URL. If unset, the committed JSON is used.
          GLOSSARY_SHEET_CSV_URL: ${{ vars.GLOSSARY_SHEET_CSV_URL }}

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
