# Topluluk kadrosu — /topluluk/ekibimiz sayfasının veri kaynağı.
# Şema:
#   anahtar:
#     name: Ad Soyad
#     title: Görev/ünvan (kart üzerinde gösterilir)
#     group: board | birim | danisman
#     unit: <birim adı>            # group=birim ise grupla, diğerleri için boş bırak
#     role_rank: 1 | 2             # 1=başkan, 2=üye (sadece sıralama için)
#     is_board: true               # birim başkanları aynı zamanda yönetim kurulundaysa
#     bio: Kısa 1-2 cümlelik açıklama.
#     email: kisi@ticaret.edu.tr
#     url: https://...             # GitHub / kişisel site / kurum sayfası
#     image_url: /img/... veya https://...

