backend:
  name: github
  repo: ticaretistatistik/ticaretistatistik.com
  branch: main
  base_url: https://ticaretistatistikcom.yigit433-devs.workers.dev
  client_id: Ov23li1WEHp6EgcsYYKl

# Herkes kendi GitHub fork'u üzerinden PR açabilir (write access gerekmez)
open_authoring: true

# "Publish" butonu direkt commit atmaz, Pull Request açar
publish_mode: editorial_workflow

media_folder: static/img/uploads
public_folder: /img/uploads

collections:
  - name: glossary
    label: Sözlük
    label_singular: Terim
    files:
      - name: glossary_terms
        label: İstatistik Terimleri
        file: src/data/glossary.json
        fields:
          - name: terms
            label: Terimler
            widget: list
            label_singular: Terim
            minimize_collapsed: true
            fields:
              - {name: term, label: "Terim (Türkçe)", widget: string}
              - {name: en, label: "İngilizce Karşılık", widget: string, required: false}
              - {name: definition, label: Tanım, widget: text}
              - {name: example, label: Örnek, widget: text, required: false}
              - name: related
                label: İlgili Terimler
                widget: list
                required: false
                field: {name: related_term, label: Terim, widget: string}
